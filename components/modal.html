<!-- ============================================================
     ExamEdge Pro — components/modal.html
     Global modal shell — content injected dynamically via JS
     ============================================================ -->
<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true"
     aria-labelledby="modal-title" style="display:none"
     onclick="if(event.target===this) window.closeModal?.()">

  <div class="modal" id="modal-box">

    <!-- Close -->
    <button class="modal__close" onclick="window.closeModal?.()" aria-label="Close dialog">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Dynamic Title -->
    <h2 class="modal__title" id="modal-title"><!-- Injected --></h2>

    <!-- Dynamic Body -->
    <div class="modal__body" id="modal-body"><!-- Injected --></div>

    <!-- Dynamic Footer -->
    <div class="modal__footer" id="modal-footer"><!-- Injected --></div>

  </div>
</div>

<script>
  /**
   * Open the global modal.
   * @param {{ title, body, footer }} opts
   */
  window.openModal = function({ title = '', body = '', footer = '' } = {}) {
    document.getElementById('modal-title').innerHTML  = title;
    document.getElementById('modal-body').innerHTML   = body;
    document.getElementById('modal-footer').innerHTML = footer;
    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    // Focus trap: focus first focusable element
    setTimeout(() => {
      const focusable = overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
      focusable[0]?.focus();
    }, 50);
  };

  window.closeModal = function() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.body.style.overflow = '';
  };

  // ESC key closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.closeModal?.();
  });
</script>
