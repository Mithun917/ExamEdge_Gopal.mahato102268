<aside class="sidebar" id="sidebar" role="complementary" aria-label="Sidebar navigation">

  <!-- Main Navigation -->
  <div class="sidebar__section">
    <div class="sidebar__label">Menu</div>
    <nav class="sidebar__nav" aria-label="Primary">

      <a class="sidebar__link" data-route="/" href="/" title="Dashboard">
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </span>
        <span>Dashboard</span>
      </a>

      <a class="sidebar__link" data-route="/practice" href="/practice" title="Practice">
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <span>Practice</span>
      </a>

      <a class="sidebar__link" data-route="/mock" href="/mock" title="Mock Exam">
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
        </span>
        <span>Mock Exam</span>
        <span class="sidebar__link-badge">New</span>
      </a>

      <a class="sidebar__link" data-route="/exam" href="/exam" title="Scheduled Exams">
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        <span>Exams</span>
      </a>

      <a class="sidebar__link" data-route="/leaderboard" href="/leaderboard" title="Leaderboard">
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </span>
        <span>Leaderboard</span>
      </a>

    </nav>
  </div>

  <!-- Account -->
  <div class="sidebar__section">
    <div class="sidebar__label">Account</div>
    <nav class="sidebar__nav">

      <a class="sidebar__link" data-route="/profile" href="/profile" title="Profile">
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span>Profile</span>
      </a>

      <button class="sidebar__link" onclick="window.signOut?.()" title="Sign Out" style="width:100%;text-align:left">
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        <span>Sign Out</span>
      </button>

    </nav>
  </div>

  <!-- XP Progress -->
  <div class="sidebar__xp-block">
    <div class="sidebar__xp-label">
      <span class="text-sm weight-medium">Level <span data-level>1</span></span>
      <span class="text-sm font-mono text-accent"><span data-xp>0</span> XP</span>
    </div>
    <div class="sidebar__xp-bar">
      <div class="sidebar__xp-fill" style="width:0%"></div>
    </div>
  </div>

</aside>
