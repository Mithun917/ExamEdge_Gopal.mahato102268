<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ExamEdge Pro — Master every exam with precision practice, intelligent analytics, and adaptive learning." />
  <title>ExamEdge Pro</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body class="app-loading">

  <!-- App Shell -->
  <div id="app-root">

    <!-- Top Navigation -->
    <div id="navbar-mount"></div>

    <!-- Page Layout -->
    <div class="app-shell" id="app-shell">
      <div id="sidebar-mount"></div>

      <main class="main-content" id="main-content" role="main" aria-live="polite">
        <!-- Pages rendered here by router -->
        <div id="page-outlet"></div>
      </main>
    </div>

    <!-- Global Modal Overlay -->
    <div id="modal-mount"></div>

    <!-- Toast Notifications -->
    <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>
  </div>

  <!-- Scripts (modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
